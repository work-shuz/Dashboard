<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>📊 Общая статистика</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: white;
      color: black;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .circles {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .circle {
      background: #1e293b;
      color: white;
      padding: 20px;
      border-radius: 50%; /* 🔥 КРУГ */
      flex: 1;
      text-align: center;
      aspect-ratio: 1 / 1; /* чтобы был идеальный круг */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .circle h2 {
      font-size: 30px;
      margin: 10px 0;
    }

    canvas {
      margin-top: 40px;
      background: white;
      border-radius: 10px;
      padding: 10px;
    }
  </style>
</head>

<body>

<h1>📈 Финансовые показатели</h1>

<div class="circles">
  <div class="circle">
    <p>Продажи</p>
    <h2 id="sales">1200</h2>
  </div>

  <div class="circle">
    <p>Прибыль</p>
    <h2 id="profit">$800</h2>
  </div>

  <div class="circle">
    <p>Клиенты</p>
    <h2 id="clients">45</h2>
  </div>
</div>

<canvas id="myChart"></canvas>

<script>
  // 📊 ГРАФИК
  const ctx = document.getElementById('myChart');

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['Пн', 'Вт', 'Ср', 'Чт', 'Пт'],
      datasets: [{
        label: 'Продажи',
        data: [12, 19, 8, 15, 22],
        borderWidth: 2
      }]
    }
  });

  // 🔥 АНИМАЦИЯ ЦИФР (с сохранением данных)
  function animateValueFromElement(id, duration) {
    const el = document.getElementById(id);

    let text = el.innerText;
    let isMoney = text.includes('$');

    // вытаскиваем число
    const end = parseInt(text.replace(/\D/g, ''));

    let start = 0;
    let startTime = null;

    function animation(currentTime) {
      if (!startTime) startTime = currentTime;

      const progress = currentTime - startTime;
      const value = Math.floor((progress / duration) * end);

      if (isMoney) {
        el.innerText = "$" + value;
      } else {
        el.innerText = value;
      }

      if (progress < duration) {
        requestAnimationFrame(animation);
      } else {
        el.innerText = isMoney ? "$" + end : end;
      }
    }

    requestAnimationFrame(animation);
  }

  // 🚀 запуск
  animateValueFromElement("sales", 1500);
  animateValueFromElement("profit", 1500);
  animateValueFromElement("clients", 1500);

</script>

</body>
</html>
