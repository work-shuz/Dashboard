<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== ОСНОВА ===== */
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* ===== HEADER ===== */
.header {
  height: 60px;
  display: flex;
  align-items: center;
  padding: 0 20px;
}

.menu-btn {
  font-size: 24px;
  cursor: pointer;
}

/* ===== SIDEBAR ===== */
.sidebar {
  position: fixed;
  top: 0;
  left: -250px;
  width: 250px;
  height: 100%;
  background: #020617;
  transition: 0.4s;
  padding-top: 60px;
  z-index: 1000;
}

.sidebar.active {
  left: 0;
}

.menu button {
  background: none;
  border: none;
  color: #cbd5f5;
  padding: 15px;
  width: 100%;
  text-align: left;
  cursor: pointer;
}

.menu button:hover {
  background: rgba(255,255,255,0.1);
}

/* ===== OVERLAY ===== */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  opacity: 0;
  visibility: hidden;
  transition: 0.3s;
}

.overlay.active {
  opacity: 1;
  visibility: visible;
}

/* ===== MAIN (ЦЕНТР) ===== */
.main {
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ===== СТРАНИЦЫ ===== */
.page {
  display: none;
  width: 100%;
  max-width: 1100px;
  text-align: center;
}

.page.active {
  display: block;
}

/* ===== КАРТОЧКИ ===== */
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
  margin-bottom: 30px;
}

.card {
  width: 180px;
  height: 200px;
  border-radius: 22px;

  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);

  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;

  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px) scale(1.05);
}

/* НЕОН */
.sales canvas { filter: drop-shadow(0 0 12px #00f0ff); }
.profit canvas { filter: drop-shadow(0 0 12px #00ff88); }
.clients canvas { filter: drop-shadow(0 0 12px #ff00ff); }

.card canvas {
  margin-bottom: 8px;
}

/* ===== ГРАФИК ===== */
canvas {
  display: block;
  margin: 0 auto;
  max-width: 800px;
  width: 100%;

  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  padding: 10px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="menu-btn" onclick="toggleSidebar()">☰</div>
</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <div class="menu">
    <button onclick="showPage('dashboard')">📊 Dashboard</button>
    <button onclick="showPage('analytics')">📈 Analytics</button>
  </div>
</div>

<!-- OVERLAY -->
<div id="overlay" class="overlay" onclick="closeSidebar()"></div>

<!-- MAIN -->
<div class="main">

  <!-- DASHBOARD -->
  <div id="dashboard" class="page active">
    <h1>📊 Dashboard</h1>

    <div class="container">

      <div class="card sales">
        <canvas id="salesChart" width="100" height="100"></canvas>
        <h2>1200</h2>
        <p>Sales</p>
      </div>

      <div class="card profit">
        <canvas id="profitChart" width="100" height="100"></canvas>
        <h2>$800</h2>
        <p>Profit</p>
      </div>

      <div class="card clients">
        <canvas id="clientsChart" width="100" height="100"></canvas>
        <h2>45</h2>
        <p>Clients</p>
      </div>

    </div>

    <canvas id="chart1"></canvas>
  </div>

  <!-- ANALYTICS -->
  <div id="analytics" class="page">
    <h1>📈 Analytics</h1>
    <canvas id="chart2"></canvas>
  </div>

</div>

<script>

/* SIDEBAR */
function toggleSidebar() {
  sidebar.classList.toggle("active");
  overlay.classList.toggle("active");
}

function closeSidebar() {
  sidebar.classList.remove("active");
  overlay.classList.remove("active");
}

/* PAGE SWITCH */
function showPage(id) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  closeSidebar();
}

/* НЕОНОВЫЕ КРУГИ */
function createProgress(id, value, color) {
  new Chart(document.getElementById(id), {
    type: 'doughnut',
    data: {
      datasets: [{
        data: [value, 100 - value],
        backgroundColor: [color, '#1e293b'],
        borderWidth: 0
      }]
    },
    options: {
      cutout: '75%',
      plugins: { tooltip: { enabled: false } }
    }
  });
}

createProgress('salesChart', 80, '#00f0ff');
createProgress('profitChart', 60, '#00ff88');
createProgress('clientsChart', 40, '#ff00ff');

/* ГРАФИК 1 */
new Chart(document.getElementById('chart1'), {
  type: 'line',
  data: {
    labels: ['Jan','Feb','Mar','Apr','May','Jun'],
    datasets: [{
      label: 'Revenue',
      data: [100,300,250,400,350,500],
      borderColor: '#00f0ff',
      backgroundColor: 'rgba(0,240,255,0.2)',
      fill: true
    }]
  }
});

/* ГРАФИК 2 */
new Chart(document.getElementById('chart2'), {
  type: 'bar',
  data: {
    labels: ['A','B','C','D'],
    datasets: [{
      label: 'Analytics',
      data: [12,19,3,5],
      backgroundColor: '#ff00ff'
    }]
  }
});

</script>

</body>
</html>
