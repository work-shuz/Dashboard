<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>📊 Общая статистика</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .circles {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .circle {
      padding: 20px;
      border-radius: 50%;
      flex: 1;
      text-align: center;
      aspect-ratio: 1/1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-weight: bold;
    }

    .sales { background: #3b82f6; }
    .profit { background: #22c55e; }
    .clients { background: #f59e0b; }

    .circle h2 {
      font-size: 32px;
      margin: 10px 0;
    }

    .up {
      color: #4ade80;
      font-size: 14px;
    }

    .down {
      color: #f87171;
      font-size: 14px;
    }

    canvas {
      margin-top: 40px;
      background: white;
      border-radius: 10px;
      padding: 10px;
    }
  </style>
</head>

<body>

<h1>📈 Финансовые показатели</h1>

<div class="circles">

  <div class="circle sales">
    <p>Продажи <span class="up">↑ 12%</span></p>
    <h2 id="sales">1200</h2>
  </div>

  <div class="circle profit">
    <p>Прибыль <span class="up">↑ 8%</span></p>
    <h2 id="profit">$800</h2>
  </div>

  <div class="circle clients">
    <p>Клиенты <span class="down">↓ 3%</span></p>
    <h2 id="clients">45</h2>
  </div>

</div>

<canvas id="myChart"></canvas>

<script>
  // 📊 ГРАФИК
  const ctx = document.getElementById('myChart');

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['Пн', 'Вт', 'Ср', 'Чт', 'Пт'],
      datasets: [{
        label: 'Продажи',
        data: [12, 19, 8, 15, 22],
        borderWidth: 2
      }]
    }
  });

  // 🔢 формат чисел
  function formatNumber(num) {
    return num.toLocaleString();
  }

  // 🔥 анимация
  function animateValueFromElement(id, duration) {
    const el = document.getElementById(id);

    let text = el.innerText;
    let isMoney = text.includes('$');

    const end = parseInt(text.replace(/\D/g, ''));

    let startTime = null;

    function animation(currentTime) {
      if (!startTime) startTime = currentTime;

      const progress = currentTime - startTime;
      const value = Math.floor((progress / duration) * end);

      if (isMoney) {
        el.innerText = "$" + formatNumber(value);
      } else {
        el.innerText = formatNumber(value);
      }

      if (progress < duration) {
        requestAnimationFrame(animation);
      } else {
        el.innerText = isMoney 
          ? "$" + formatNumber(end) 
          : formatNumber(end);
      }
    }

    requestAnimationFrame(animation);
  }

  // 🚀 запуск
  animateValueFromElement("sales", 1500);
  animateValueFromElement("profit", 1500);
  animateValueFromElement("clients", 1500);

</script>

</body>
</html>
