<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== ОСНОВА ===== */
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* ===== HEADER ===== */
.header {
  height: 60px;
  display: flex;
  align-items: center;
  padding: 0 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

/* КНОПКА МЕНЮ */
.menu-btn {
  font-size: 24px;
  cursor: pointer;
}

/* ===== SIDEBAR ===== */
.sidebar {
  position: fixed;
  top: 0;
  left: -250px; /* скрыта */
  width: 250px;
  height: 100%;
  background: #020617;
  transition: 0.4s;
  padding-top: 60px;
  z-index: 1000;
}

.sidebar.active {
  left: 0;
}

.sidebar h2 {
  text-align: center;
}

.menu {
  display: flex;
  flex-direction: column;
}

.menu button {
  background: none;
  border: none;
  color: #cbd5f5;
  padding: 15px;
  text-align: left;
  cursor: pointer;
  transition: 0.3s;
}

.menu button:hover {
  background: rgba(255,255,255,0.1);
  color: white;
}

/* ===== OVERLAY ===== */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  opacity: 0;
  visibility: hidden;
  transition: 0.3s;
}

.overlay.active {
  opacity: 1;
  visibility: visible;
}

/* ===== MAIN ===== */
.main {
  padding: 20px;
}

/* ===== СТРАНИЦЫ ===== */
.page {
  display: none;
}

.page.active {
  display: block;
}

/* ===== КАРТОЧКИ ===== */
.container {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  width: 180px;
  height: 200px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="menu-btn" onclick="toggleSidebar()">☰</div>
</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <h2>⚡ Menu</h2>
  <div class="menu">
    <button onclick="showPage('dashboard')">📊 Dashboard</button>
    <button onclick="showPage('analytics')">📈 Analytics</button>
  </div>
</div>

<!-- OVERLAY -->
<div id="overlay" class="overlay" onclick="closeSidebar()"></div>

<!-- MAIN -->
<div class="main">

  <!-- DASHBOARD -->
  <div id="dashboard" class="page active">
    <h1>📊 Dashboard</h1>

    <div class="container">
      <div class="card"><h2>1200</h2><p>Sales</p></div>
      <div class="card"><h2>$800</h2><p>Profit</p></div>
      <div class="card"><h2>45</h2><p>Clients</p></div>
    </div>

    <canvas id="chart1"></canvas>
  </div>

  <!-- ANALYTICS -->
  <div id="analytics" class="page">
    <h1>📈 Analytics</h1>
    <canvas id="chart2"></canvas>
  </div>

</div>

<script>

/* ===== SIDEBAR ===== */
function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}

function closeSidebar() {
  document.getElementById("sidebar").classList.remove("active");
  document.getElementById("overlay").classList.remove("active");
}

/* ===== ПЕРЕКЛЮЧЕНИЕ СТРАНИЦ ===== */
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => {
    p.classList.remove('active');
  });

  document.getElementById(pageId).classList.add('active');

  closeSidebar(); // закрыть после выбора
}

/* ===== ГРАФИКИ ===== */
new Chart(document.getElementById('chart1'), {
  type: 'line',
  data: {
    labels: ['Jan','Feb','Mar','Apr','May','Jun'],
    datasets: [{
      label: 'Revenue',
      data: [100,300,250,400,350,500],
      borderColor: '#00f0ff',
      backgroundColor: 'rgba(0,240,255,0.2)',
      fill: true
    }]
  }
});

new Chart(document.getElementById('chart2'), {
  type: 'bar',
  data: {
    labels: ['A','B','C','D'],
    datasets: [{
      label: 'Analytics',
      data: [12,19,3,5],
      backgroundColor: '#ff00ff'
    }]
  }
});

</script>

</body>
</html>
