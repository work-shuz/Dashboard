<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #020617;
      color: #fff;
    }

    /* ===== ЛЕЙАУТ ===== */
    .container {
      padding: 20px;
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    /* ===== КАРТОЧКИ ===== */
    .card {
      background: #0f172a;
      border-radius: 16px;
      padding: 20px;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;

      min-height: 200px;

      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    /* 🔥 ФИКС КРУГОВ */
    .card canvas {
      width: 110px !important;
      height: 110px !important;
    }

    .card h3 {
      margin: 0;
      font-size: 16px;
      color: #94a3b8;
    }

    .card p {
      margin: 0;
      font-size: 20px;
      font-weight: bold;
    }

    /* ===== ГРАФИК ===== */
    .chart-card {
      background: #0f172a;
      border-radius: 16px;
      padding: 20px;
    }

    .chart-card canvas {
      width: 100% !important;
      height: 300px !important;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- КАРТОЧКИ -->
  <div class="dashboard">

    <div class="card">
      <canvas id="chart1"></canvas>
      <h3>Sales</h3>
      <p>$12,400</p>
    </div>

    <div class="card">
      <canvas id="chart2"></canvas>
      <h3>Users</h3>
      <p>8,230</p>
    </div>

    <div class="card">
      <canvas id="chart3"></canvas>
      <h3>Conversion</h3>
      <p>32%</p>
    </div>

  </div>

  <!-- ГРАФИК -->
  <div class="chart-card">
    <canvas id="mainChart"></canvas>
  </div>

</div>

<script>
/* ===== КРУГИ ===== */
function createCircle(id, value, color) {
  const ctx = document.getElementById(id).getContext('2d');

  new Chart(ctx, {
    type: 'doughnut',
    data: {
      datasets: [{
        data: [value, 100 - value],
        backgroundColor: [color, '#1e293b'],
        borderWidth: 0,
        cutout: '70%'
      }]
    },
    options: {
      responsive: false,
      plugins: {
        tooltip: { enabled: false },
        legend: { display: false }
      }
    }
  });
}

createCircle('chart1', 75, '#00f0ff');
createCircle('chart2', 60, '#6366f1');
createCircle('chart3', 32, '#22c55e');


/* ===== ГЛАВНЫЙ ГРАФИК ===== */
const ctx = document.getElementById('mainChart').getContext('2d');

/* ГРАДИЕНТ */
const gradient = ctx.createLinearGradient(0, 0, 0, 300);
gradient.addColorStop(0, "rgba(0,240,255,0.5)");
gradient.addColorStop(1, "rgba(0,240,255,0)");

new Chart(ctx, {
  type: 'line',
  data: {
    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
    datasets: [{
      label: 'Revenue',
      data: [100, 300, 250, 400, 350, 500],

      borderColor: '#00f0ff',
      backgroundColor: gradient,
      tension: 0.5,
      fill: true,

      pointBackgroundColor: '#00f0ff',
      pointBorderColor: '#fff',
      pointRadius: 5,
      pointHoverRadius: 7,

      borderWidth: 3
    }]
  },
  options: {
    responsive: true,

    plugins: {
      legend: {
        labels: {
          color: '#fff'
        }
      },
      tooltip: {
        backgroundColor: '#0f172a',
        borderColor: '#00f0ff',
        borderWidth: 1,
        titleColor: '#fff',
        bodyColor: '#cbd5f5'
      }
    },

    scales: {
      x: {
        ticks: { color: '#94a3b8' },
        grid: {
          color: 'rgba(255,255,255,0.05)'
        }
      },
      y: {
        ticks: { color: '#94a3b8' },
        grid: {
          color: 'rgba(255,255,255,0.05)'
        }
      }
    }
  }
});
</script>

</body>
</html>
