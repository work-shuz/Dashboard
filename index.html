<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>📊 Дашборд</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f1f5f9; /* светлый фон */
  color: #0f172a;
}

/* LOGIN */
#login {
  display: flex;
  height: 100vh;
  justify-content: center;
  align-items: center;
}

.login-box {
  background: white;
  padding: 30px;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

input {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 220px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  padding: 10px 20px;
  background: #3b82f6;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

/* DASHBOARD */
#dashboard {
  display: none;
  padding: 30px;
}

h1 {
  text-align: center;
}

/* КРУГИ */
.circles {
  display: flex;
  justify-content: center; /* центрируем */
  gap: 30px;
  margin-top: 30px;
  flex-wrap: wrap;
}

.circle {
  background: white;
  border-radius: 50%;
  width: 160px;
  height: 160px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.circle:hover {
  transform: translateY(-5px) scale(1.05);
}

.circle p {
  margin: 0;
  color: #64748b;
}

.circle h2 {
  font-size: 30px;
  margin: 5px 0;
}

/* ГРАФИК */
canvas {
  margin: 50px auto 0;
  display: block;
  max-width: 800px;
  background: white;
  border-radius: 12px;
  padding: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h2>Вход</h2>
    <input type="text" id="user" placeholder="Логин">
    <input type="password" id="pass" placeholder="Пароль">
    <button onclick="login()">Войти</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <h1>📈 Финансовые показатели</h1>

  <div class="circles">
    <div class="circle">
      <p>Продажи</p>
      <h2 id="sales">0</h2>
    </div>

    <div class="circle">
      <p>Прибыль</p>
      <h2 id="profit">0</h2>
    </div>

    <div class="circle">
      <p>Клиенты</p>
      <h2 id="clients">0</h2>
    </div>
  </div>

  <canvas id="myChart"></canvas>
</div>

<script>
function login() {
  const user = document.getElementById('user').value;
  const pass = document.getElementById('pass').value;

  if (user === 'admin' && pass === '1234') {
    document.getElementById('login').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    startDashboard();
  } else {
    alert('Неверный логин или пароль');
  }
}

/* АНИМАЦИЯ */
function animateValue(id, start, end, duration, prefix = '') {
  let startTime = null;

  function step(timestamp) {
    if (!startTime) startTime = timestamp;
    let progress = timestamp - startTime;
    let value = Math.min(progress / duration * (end - start) + start, end);

    document.getElementById(id).innerText = prefix + Math.floor(value);

    if (progress < duration) {
      requestAnimationFrame(step);
    }
  }

  requestAnimationFrame(step);
}

/* ЗАПУСК */
function startDashboard() {

  animateValue('sales', 0, 1200, 1000);
  animateValue('profit', 0, 800, 1000, '$');
  animateValue('clients', 0, 45, 1000);

  const ctx = document.getElementById('myChart').getContext('2d');

  const gradient = ctx.createLinearGradient(0, 0, 0, 400);
  gradient.addColorStop(0, 'rgba(59,130,246,0.4)');
  gradient.addColorStop(1, 'rgba(59,130,246,0)');

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['Пн', 'Вт', 'Ср', 'Чт', 'Пт'],
      datasets: [{
        label: 'Продажи',
        data: [12, 19, 8, 15, 22],
        borderColor: '#3b82f6',
        backgroundColor: gradient,
        fill: true,
        tension: 0.4,
        pointBackgroundColor: '#3b82f6'
      }]
    },
    options: {
      plugins: {
        legend: {
          labels: { color: '#0f172a' }
        }
      },
      scales: {
        x: {
          ticks: { color: '#0f172a' }
        },
        y: {
          ticks: { color: '#0f172a' }
        }
      }
    }
  });
}
</script>

</body>
</html>
