<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>📊 Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 { text-align: center; }

    /* 🔐 ЛОГИН */
    .login {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 100px;
      gap: 10px;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: none;
      width: 200px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    /* 📊 ДАШБОРД */
    .dashboard { display: none; }

    .circles {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .circle {
      padding: 20px;
      border-radius: 50%;
      flex: 1;
      text-align: center;
      aspect-ratio: 1/1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .sales { background: #3b82f6; }
    .profit { background: #22c55e; }
    .clients { background: #f59e0b; }

    .up { color: #4ade80; }
    .down { color: #f87171; }

    canvas {
      margin-top: 40px;
      background: white;
      border-radius: 10px;
      padding: 10px;
    }
  </style>
</head>

<body>

<!-- 🔐 ЛОГИН -->
<div class="login" id="loginBlock">
  <h2>Вход</h2>
  <input type="text" id="login" placeholder="Логин">
  <input type="password" id="password" placeholder="Пароль">
  <button onclick="checkLogin()">Войти</button>
</div>

<!-- 📊 ДАШБОРД -->
<div class="dashboard" id="dashboard">

<h1>📈 Финансовые показатели</h1>

<div class="circles">

  <div class="circle sales">
    <p>Продажи <span class="up">↑ 12%</span></p>
    <h2 id="sales">1200</h2>
  </div>

  <div class="circle profit">
    <p>Прибыль <span class="up">↑ 8%</span></p>
    <h2 id="profit">$800</h2>
  </div>

  <div class="circle clients">
    <p>Клиенты <span class="down">↓ 3%</span></p>
    <h2 id="clients">45</h2>
  </div>

</div>

<canvas id="myChart"></canvas>

</div>

<script>
  // 🔐 ПРОСТОЙ ЛОГИН
  function checkLogin() {
    const login = document.getElementById('login').value;
    const password = document.getElementById('password').value;

    if (login === "admin" && password === "1234") {
      document.getElementById('loginBlock').style.display = "none";
      document.getElementById('dashboard').style.display = "block";

      startDashboard();
    } else {
      alert("Неверный логин или пароль");
    }
  }

  // 🚀 запуск дашборда
  function startDashboard() {
    animate("sales", 1500);
    animate("profit", 1500);
    animate("clients", 1500);
    createChart();
  }

  // 🔢 формат
  function format(num) {
    return num.toLocaleString();
  }

  // 🔥 анимация цифр
  function animate(id, duration) {
    const el = document.getElementById(id);
    let text = el.innerText;
    let isMoney = text.includes('$');
    let end = parseInt(text.replace(/\D/g, ''));

    let startTime = null;

    function step(t) {
      if (!startTime) startTime = t;
      let progress = t - startTime;
      let value = Math.floor((progress / duration) * end);

      el.innerText = isMoney ? "$" + format(value) : format(value);

      if (progress < duration) {
        requestAnimationFrame(step);
      } else {
        el.innerText = isMoney ? "$" + format(end) : format(end);
      }
    }

    requestAnimationFrame(step);
  }

  // 📊 УЛУЧШЕННЫЙ ГРАФИК
  function createChart() {
    const ctx = document.getElementById('myChart').getContext('2d');

    new Chart(ctx, {
      type: 'line',
      data: {
        labels: ['Пн', 'Вт', 'Ср', 'Чт', 'Пт'],
        datasets: [{
          label: 'Продажи',
          data: [12, 19, 8, 15, 22],
          borderWidth: 3,
          tension: 0.4, // 🔥 плавные линии
          fill: true,   // 🔥 заливка
          backgroundColor: 'rgba(59,130,246,0.2)'
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: {
            labels: { color: 'black' }
          }
        },
        scales: {
          y: {
            beginAtZero: true
          }
        }
      }
    });
  }
</script>

</body>
</html>
