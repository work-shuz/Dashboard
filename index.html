<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>⚡ Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f8fafc; /* БЕЛЫЙ ФОН */
  color: #0f172a;
}

h1 {
  text-align: center;
}

/* КРУГИ */
.circles {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 40px;
  flex-wrap: wrap;
}

.circle {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  background: #0f172a; /* ТЁМНЫЙ ДЛЯ НЕОНА */
  color: white;
  transition: 0.3s;
}

/* 🔵 СИНИЙ НЕОН */
.sales {
  box-shadow:
    0 0 10px #3b82f6,
    0 0 25px #3b82f6,
    0 0 50px #3b82f6,
    0 10px 25px rgba(0,0,0,0.15); /* тень вниз */
}

/* 🟢 ЗЕЛЁНЫЙ НЕОН */
.profit {
  box-shadow:
    0 0 10px #22c55e,
    0 0 25px #22c55e,
    0 0 50px #22c55e,
    0 10px 25px rgba(0,0,0,0.15);
}

/* 🟠 ОРАНЖЕВЫЙ НЕОН */
.clients {
  box-shadow:
    0 0 10px #f97316,
    0 0 25px #f97316,
    0 0 50px #f97316,
    0 10px 25px rgba(0,0,0,0.15);
}

.circle:hover {
  transform: scale(1.1);
  filter: brightness(1.2);
}

.circle p {
  margin: 0;
  opacity: 0.8;
}

.circle h2 {
  font-size: 30px;
  margin: 5px 0;
}

/* ГРАФИК */
canvas {
  margin: 60px auto 0;
  display: block;
  max-width: 800px;
  background: white;
  border-radius: 12px;
  padding: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<h1>📈 Финансовые показатели</h1>

<div class="circles">
  <div class="circle sales">
    <p>Продажи</p>
    <h2 id="sales">0</h2>
  </div>

  <div class="circle profit">
    <p>Прибыль</p>
    <h2 id="profit">0</h2>
  </div>

  <div class="circle clients">
    <p>Клиенты</p>
    <h2 id="clients">0</h2>
  </div>
</div>

<canvas id="myChart"></canvas>

<script>
function animate(id, start, end, duration, prefix = '') {
  let startTime = null;

  function step(t) {
    if (!startTime) startTime = t;
    let progress = t - startTime;

    let value = Math.min(progress / duration * (end - start) + start, end);

    document.getElementById(id).innerText =
      prefix + Math.floor(value);

    if (progress < duration) {
      requestAnimationFrame(step);
    }
  }

  requestAnimationFrame(step);
}

window.onload = function() {

  animate('sales', 0, 1200, 1200);
  animate('profit', 0, 800, 1200, '$');
  animate('clients', 0, 45, 1200);

  const ctx = document.getElementById('myChart').getContext('2d');

  const gradient = ctx.createLinearGradient(0, 0, 0, 400);
  gradient.addColorStop(0, 'rgba(59,130,246,0.4)');
  gradient.addColorStop(1, 'rgba(59,130,246,0)');

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['Пн', 'Вт', 'Ср', 'Чт', 'Пт'],
      datasets: [{
        label: 'Продажи',
        data: [12, 19, 8, 15, 22],
        borderColor: '#3b82f6',
        backgroundColor: gradient,
        fill: true,
        tension: 0.4,
        pointBackgroundColor: '#3b82f6'
      }]
    }
  });
};
</script>

</body>
</html>
