<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: #ffffff;
  text-align: center;
  padding: 20px;
}

/* КОНТЕЙНЕР */
.container {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
  margin-bottom: 40px;
}

/* КАРТОЧКИ (СТАРЫЙ СТИЛЬ) */
.card {
  width: 180px;
  height: 200px;
  border-radius: 20px;

  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(10px);

  border: 1px solid rgba(255,255,255,0.1);

  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;

  transition: 0.3s;
}

/* ХОВЕР ПРОСТОЙ */
.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 15px 35px rgba(0,0,0,0.5);
}

/* ТЕКСТ */
.card h2 {
  font-size: 26px;
  margin: 5px 0;
}

.progress-text p {
  margin: 0;
  font-size: 12px;
  color: #cbd5f5;
}

/* НЕОН ДЛЯ КРУГОВ */
.sales canvas {
  filter: drop-shadow(0 0 12px #00f0ff);
}

.profit canvas {
  filter: drop-shadow(0 0 12px #00ff88);
}

.clients canvas {
  filter: drop-shadow(0 0 12px #ff00ff);
}

/* ГРАФИК */
#myChart {
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  padding: 10px;
}
</style>
</head>

<body>

<h1>📊 Dashboard</h1>

<div class="container">

  <div class="card sales">
    <canvas id="salesChart" width="100" height="100"></canvas>
    <h2 id="sales">0</h2>
    <div class="progress-text"><p>Sales</p></div>
  </div>

  <div class="card profit">
    <canvas id="profitChart" width="100" height="100"></canvas>
    <h2 id="profit">0</h2>
    <div class="progress-text"><p>Profit</p></div>
  </div>

  <div class="card clients">
    <canvas id="clientsChart" width="100" height="100"></canvas>
    <h2 id="clients">0</h2>
    <div class="progress-text"><p>Clients</p></div>
  </div>

</div>

<canvas id="myChart" height="100"></canvas>

<script>

/* АНИМАЦИЯ ЧИСЕЛ */
function animateValue(id, start, end, duration, prefix="") {
  let obj = document.getElementById(id);
  let startTime = null;

  function easeOutQuad(t) {
    return t * (2 - t);
  }

  function step(timestamp) {
    if (!startTime) startTime = timestamp;
    let progress = Math.min((timestamp - startTime) / duration, 1);
    let eased = easeOutQuad(progress);

    let value = Math.floor(eased * (end - start) + start);
    obj.innerHTML = prefix + value;

    if (progress < 1) {
      requestAnimationFrame(step);
    }
  }

  requestAnimationFrame(step);
}

/* ЗАПУСК */
animateValue("sales", 0, 1200, 1500);
animateValue("profit", 0, 800, 1500, "$");
animateValue("clients", 0, 45, 1500);

/* КРУГОВЫЕ ПРОГРЕССЫ */
function createProgress(id, value, color) {
  new Chart(document.getElementById(id), {
    type: 'doughnut',
    data: {
      datasets: [{
        data: [value, 100 - value],
        backgroundColor: [color, '#1e293b'],
        borderWidth: 0
      }]
    },
    options: {
      cutout: '75%',
      plugins: {
        tooltip: { enabled: false }
      }
    }
  });
}

createProgress('salesChart', 80, '#00f0ff');
createProgress('profitChart', 60, '#00ff88');
createProgress('clientsChart', 40, '#ff00ff');

/* ===== НОВЫЙ КРАСИВЫЙ ГРАФИК ===== */

const ctx = document.getElementById('myChart').getContext('2d');

/* ГРАДИЕНТ */
const gradient = ctx.createLinearGradient(0, 0, 0, 300);
gradient.addColorStop(0, "rgba(0,240,255,0.5)");
gradient.addColorStop(1, "rgba(0,240,255,0)");

new Chart(ctx, {
  type: 'line',
  data: {
    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
    datasets: [{
      label: 'Revenue',
      data: [100, 300, 250, 400, 350, 500],

      borderColor: '#00f0ff',
      backgroundColor: gradient,

      tension: 0.5,
      fill: true,

      pointBackgroundColor: '#00f0ff',
      pointBorderColor: '#fff',
      pointRadius: 5,
      pointHoverRadius: 7,

      borderWidth: 3
    }]
  },
  options: {
    responsive: true,

    plugins: {
      legend: {
        labels: {
          color: '#fff',
          font: { size: 14 }
        }
      },
      tooltip: {
        backgroundColor: '#0f172a',
        borderColor: '#00f0ff',
        borderWidth: 1,
        titleColor: '#fff',
        bodyColor: '#cbd5f5'
      }
    },

    scales: {
      x: {
        ticks: { color: '#94a3b8' },
        grid: {
          color: 'rgba(255,255,255,0.05)'
        }
      },
      y: {
        ticks: { color: '#94a3b8' },
        grid: {
          color: 'rgba(255,255,255,0.05)'
        }
      }
    }
  }
});

</script>

</body>
</html>
