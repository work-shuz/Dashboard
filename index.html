<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>📊Общая статистика</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial;
      background: #f1f5f9;
      color: black;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .circles {
      display: flex;
      gap: 20px;
      margin-top: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .circle {
      background: #1e293b;
      width: 150px;
      height: 150px;
      border-radius: 50%;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      color: white;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      transition: 0.3s;
    }

    .circle:hover {
      transform: translateY(-5px);
    }

    .circle h2 {
      font-size: 28px;
      margin: 5px 0;
    }

    .circle p {
      margin: 0;
      font-size: 14px;
      opacity: 0.8;
    }

    canvas {
      margin-top: 40px;
      background: white;
      border-radius: 10px;
      padding: 10px;
    }
  </style>
</head>
<body>

<h1>📈Финансовые показатели</h1>

<div class="circles">
  <div class="circle">
    <p>Продажи</p>
    <h2 id="sales">0</h2>
  </div>

  <div class="circle">
    <p>Прибыль</p>
    <h2 id="profit">0</h2>
  </div>

  <div class="circle">
    <p>Клиенты</p>
    <h2 id="clients">0</h2>
  </div>
</div>

<canvas id="myChart"></canvas>
