<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>📊 Финансовый дашборд</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #ffffff;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 1100px;
  margin: auto;
}

h1 {
  margin-bottom: 30px;
}

/* КАРТОЧКИ */
.cards {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-bottom: 40px;
}

.card {
  width: 180px;
  height: 200px;
  border-radius: 20px;
  background: #ffffff;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

/* ПРОГРЕСС */
.progress-box {
  width: 120px;
  height: 120px;
  position: relative;
}

.progress-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.progress-text h2 {
  margin: 0;
  font-size: 22px;
}

.progress-text p {
  margin: 0;
  font-size: 12px;
}

/* НЕОН */
.sales canvas {
  filter: drop-shadow(0 0 10px #00f0ff);
}

.profit canvas {
  filter: drop-shadow(0 0 10px #00ff88);
}

.clients canvas {
  filter: drop-shadow(0 0 10px #ff00ff);
}

/* ГРАФИК */
#myChart {
  background: #f8fafc;
  border-radius: 12px;
  padding: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>📈 Финансовые показатели</h1>

  <div class="cards">

    <div class="card sales">
      <div class="progress-box">
        <canvas id="salesChart"></canvas>
        <div class="progress-text">
          <h2 id="sales">0</h2>
          <p>Продажи</p>
        </div>
      </div>
    </div>

    <div class="card profit">
      <div class="progress-box">
        <canvas id="profitChart"></canvas>
        <div class="progress-text">
          <h2 id="profit">0</h2>
          <p>Прибыль</p>
        </div>
      </div>
    </div>

    <div class="card clients">
      <div class="progress-box">
        <canvas id="clientsChart"></canvas>
        <div class="progress-text">
          <h2 id="clients">0</h2>
          <p>Клиенты</p>
        </div>
      </div>
    </div>

  </div>

  <canvas id="myChart"></canvas>
</div>

<script>
/* АНИМАЦИЯ ЧИСЕЛ */
function animateValue(id, start, end, duration, prefix="") {
  let obj = document.getElementById(id);
  let range = end - start;
  let startTime = null;

  function step(timestamp) {
    if (!startTime) startTime = timestamp;
    let progress = Math.min((timestamp - startTime) / duration, 1);
    let value = Math.floor(progress * range + start);
    obj.innerHTML = prefix + value;
    if (progress < 1) requestAnimationFrame(step);
  }

  requestAnimationFrame(step);
}

/* ДАННЫЕ */
animateValue("sales", 0, 1200, 1500);
animateValue("profit", 0, 800, 1500, "$");
animateValue("clients", 0, 45, 1500);

/* ПРОГРЕСС */
function createProgress(id, value, color) {
  new Chart(document.getElementById(id), {
    type: 'doughnut',
    data: {
      datasets: [{
        data: [value, 100 - value],
        backgroundColor: [color, '#e5e7eb'],
        borderWidth: 0
      }]
    },
    options: {
      cutout: '75%',
      plugins: { legend: { display: false } }
    }
  });
}

createProgress('salesChart', 75, '#00f0ff');
createProgress('profitChart', 60, '#00ff88');
createProgress('clientsChart', 40, '#ff00ff');

/* ГРАФИК */
new Chart(document.getElementById('myChart'), {
  type: 'line',
  data: {
    labels: ['Пн', 'Вт', 'Ср', 'Чт', 'Пт'],
    datasets: [{
      label: 'Продажи',
      data: [12, 19, 8, 15, 22],
      borderColor: '#00f0ff',
      backgroundColor: 'rgba(0,240,255,0.2)',
      tension: 0.4,
      fill: true
    }]
  }
});
</script>

</body>
</html>
