<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>📊 Финансовый дашборд</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #ffffff;
  margin: 0;
  padding: 20px;
  text-align: center;
}

.container {
  max-width: 1000px;
  margin: auto;
}

h1 {
  margin-bottom: 30px;
}

/* КОНТЕЙНЕР КРУГОВ */
.circles {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-bottom: 40px;
}

/* ОБЩИЙ СТИЛЬ */
.circle {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  font-weight: bold;
  transition: 0.3s;
}

/* НЕОНОВЫЕ ЗАЛИТЫЕ ЦВЕТА */
.sales {
  background: #00f0ff;
  box-shadow: 
    0 0 20px #00f0ff,
    0 0 40px #00f0ff,
    0 0 60px #00f0ff;
}

.profit {
  background: #00ff88;
  box-shadow: 
    0 0 20px #00ff88,
    0 0 40px #00ff88,
    0 0 60px #00ff88;
}

.clients {
  background: #ff00ff;
  box-shadow: 
    0 0 20px #ff00ff,
    0 0 40px #ff00ff,
    0 0 60px #ff00ff;
}

/* ТЕКСТ */
.circle p {
  margin: 0;
  font-size: 14px;
}

.circle h2 {
  margin: 5px 0 0;
  font-size: 26px;
}

/* ЭФФЕКТ НАВЕДЕНИЯ */
.circle:hover {
  transform: scale(1.08);
}

/* ГРАФИК */
canvas {
  background: #f8fafc;
  border-radius: 12px;
  padding: 15px;
}
</style>
</head>

<body>

<div class="container">
  <h1>📈 Финансовые показатели</h1>

  <div class="circles">
    <div class="circle sales">
      <p>Продажи</p>
      <h2 id="sales">0</h2>
    </div>

    <div class="circle profit">
      <p>Прибыль</p>
      <h2 id="profit">0</h2>
    </div>

    <div class="circle clients">
      <p>Клиенты</p>
      <h2 id="clients">0</h2>
    </div>
  </div>

  <canvas id="myChart"></canvas>
</div>

<script>
/* АНИМАЦИЯ */
function animateValue(id, start, end, duration, prefix="") {
  let obj = document.getElementById(id);
  let range = end - start;
  let startTime = null;

  function step(timestamp) {
    if (!startTime) startTime = timestamp;
    let progress = Math.min((timestamp - startTime) / duration, 1);
    let value = Math.floor(progress * range + start);
    obj.innerHTML = prefix + value;
    if (progress < 1) requestAnimationFrame(step);
  }

  requestAnimationFrame(step);
}

/* ДАННЫЕ */
animateValue("sales", 0, 1200, 1500);
animateValue("profit", 0, 800, 1500, "$");
animateValue("clients", 0, 45, 1500);

/* ГРАФИК */
const ctx = document.getElementById('myChart');

new Chart(ctx, {
  type: 'line',
  data: {
    labels: ['Пн', 'Вт', 'Ср', 'Чт', 'Пт'],
    datasets: [{
      label: 'Продажи',
      data: [12, 19, 8, 15, 22],
      borderColor: '#00f0ff',
      backgroundColor: 'rgba(0,240,255,0.2)',
      tension: 0.4,
      fill: true,
      pointRadius: 5,
      pointBackgroundColor: '#00f0ff'
    }]
  },
  options: {
    plugins: {
      legend: {
        labels: { color: '#000' }
      }
    },
    scales: {
      x: { ticks: { color: '#000' } },
      y: { ticks: { color: '#000' } }
    }
  }
});
</script>

</body>
</html>
