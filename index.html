<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== ОСНОВА ===== */
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  display: flex;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 220px;
  height: 100vh;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-right: 1px solid rgba(255,255,255,0.1);
  padding-top: 20px;
  position: fixed;
}

.sidebar h2 {
  text-align: center;
  margin-bottom: 30px;
}

.menu {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.menu button {
  background: none;
  border: none;
  color: #cbd5f5;
  padding: 12px;
  text-align: left;
  cursor: pointer;
  transition: 0.3s;
  font-size: 14px;
}

.menu button:hover {
  background: rgba(255,255,255,0.1);
  color: white;
}

/* ===== КОНТЕНТ ===== */
.main {
  margin-left: 220px;
  padding: 20px;
  width: 100%;
}

/* ===== СТРАНИЦЫ ===== */
.page {
  display: none;
}

.page.active {
  display: block;
}

/* ===== КАРТОЧКИ ===== */
.container {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  margin-bottom: 40px;
}

.card {
  width: 180px;
  height: 200px;
  border-radius: 22px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);

  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;

  transition: 0.4s;
}

.card:hover {
  transform: translateY(-10px);
}

/* ===== ГРАФИК ===== */
canvas {
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  padding: 10px;
}

</style>
</head>

<body>

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">
  <h2>⚡ Panel</h2>
  <div class="menu">
    <button onclick="showPage('dashboard')">📊 Dashboard</button>
    <button onclick="showPage('analytics')">📈 Analytics</button>
  </div>
</div>

<!-- ===== MAIN ===== -->
<div class="main">

  <!-- ===== DASHBOARD ===== -->
  <div id="dashboard" class="page active">
    <h1>📊 Dashboard</h1>

    <div class="container">
      <div class="card">
        <h2 id="sales">1200</h2>
        <p>Sales</p>
      </div>

      <div class="card">
        <h2 id="profit">$800</h2>
        <p>Profit</p>
      </div>

      <div class="card">
        <h2 id="clients">45</h2>
        <p>Clients</p>
      </div>
    </div>

    <canvas id="chart1"></canvas>
  </div>

  <!-- ===== ANALYTICS ===== -->
  <div id="analytics" class="page">
    <h1>📈 Analytics</h1>

    <p>Здесь можно сделать:</p>
    <ul>
      <li>Фильтры</li>
      <li>Доп графики</li>
      <li>Разбивку по дням</li>
    </ul>

    <canvas id="chart2"></canvas>
  </div>

</div>

<script>

/* ===== ПЕРЕКЛЮЧЕНИЕ СТРАНИЦ ===== */
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => {
    p.classList.remove('active');
  });

  document.getElementById(pageId).classList.add('active');
}

/* ===== ГРАФИК 1 ===== */
new Chart(document.getElementById('chart1'), {
  type: 'line',
  data: {
    labels: ['Jan','Feb','Mar','Apr','May','Jun'],
    datasets: [{
      label: 'Revenue',
      data: [100,300,250,400,350,500],
      borderColor: '#00f0ff',
      backgroundColor: 'rgba(0,240,255,0.2)',
      fill: true
    }]
  }
});

/* ===== ГРАФИК 2 ===== */
new Chart(document.getElementById('chart2'), {
  type: 'bar',
  data: {
    labels: ['A','B','C','D'],
    datasets: [{
      label: 'Analytics',
      data: [12,19,3,5],
      backgroundColor: '#ff00ff'
    }]
  }
});

</script>

</body>
</html>
