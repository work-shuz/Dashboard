<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>📊Общая статистика</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial;
      background: white;
      color: black;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .cards {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      flex: 1;
      text-align: center;
    }

    .card h2 {
      font-size: 30px;
      margin: 10px 0;
    }

    canvas {
      margin-top: 40px;
      background: white;
      border-radius: 10px;
      padding: 10px;
    }
  </style>
</head>
<body>

<h1>📈Финансовые показатели</h1>

<div class="rounds">
  <div class="round">
    <p>Продажи</p>
    <h2 id="sales">1200</h2>
  </div>

  <div class="card">
    <p>Прибыль</p>
    <h2 id="profit">$800</h2>
  </div>

  <div class="card">
    <p>Клиенты</p>
    <h2 id="clients">45</h2>
  </div>
</div>

<canvas id="myChart"></canvas>

<script>
  const ctx = document.getElementById('myChart');

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['Пн', 'Вт', 'Ср', 'Чт', 'Пт'],
      datasets: [{
        label: 'Продажи',
        data: [12, 19, 8, 15, 22],
        borderWidth: 2
      }]
    }
  });
</script>
