<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>⚡ Neon Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1020;
  color: white;
}

/* 📊 DASHBOARD */
#dashboard {
  padding: 30px;
}

h1 {
  text-align: center;
}

/* 🔵 NEON CIRCLES */
.circles {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 30px;
  flex-wrap: wrap;
}

.circle {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: #0f172a;
  transition: 0.3s;
}

/* 🔵 SALES */
.sales {
  box-shadow:
    0 0 10px #3b82f6,
    0 0 25px #3b82f6,
    0 0 50px #3b82f6;
}

/* 🟢 PROFIT */
.profit {
  box-shadow:
    0 0 10px #22c55e,
    0 0 25px #22c55e,
    0 0 50px #22c55e;
}

/* 🟠 CLIENTS */
.clients {
  box-shadow:
    0 0 10px #f97316,
    0 0 25px #f97316,
    0 0 50px #f97316;
}

.circle:hover {
  transform: scale(1.1);
  filter: brightness(1.3);
}

.circle p {
  margin: 0;
  opacity: 0.8;
}

.circle h2 {
  font-size: 30px;
  margin: 5px 0;
}

/* 📈 CHART */
canvas {
  margin: 50px auto 0;
  display: block;
  max-width: 800px;
  background: #111827;
  border-radius: 12px;
  padding: 15px;
  box-shadow: 0 0 20px rgba(59,130,246,0.2);
}
</style>
</head>

<body>

<!-- 📊 DASHBOARD -->
<div id="dashboard">
  <h1>⚡ Neon Dashboard</h1>

  <div class="circles">
    <div class="circle sales">
      <p>Продажи</p>
      <h2 id="sales">0</h2>
    </div>

    <div class="circle profit">
      <p>Прибыль</p>
      <h2 id="profit">0</h2>
    </div>

    <div class="circle clients">
      <p>Клиенты</p>
      <h2 id="clients">0</h2>
    </div>
  </div>

  <canvas id="myChart"></canvas>
</div>

<script>

/* 🔢 АНИМАЦИЯ */
function animate(id, start, end, duration, prefix = '') {
  let startTime = null;

  function step(t) {
    if (!startTime) startTime = t;
    let progress = t - startTime;

    let value = Math.min(progress / duration * (end - start) + start, end);

    document.getElementById(id).innerText =
      prefix + Math.floor(value);

    if (progress < duration) {
      requestAnimationFrame(step);
    }
  }

  requestAnimationFrame(step);
}

/* 🚀 АВТОСТАРТ */
window.onload = function() {

  animate('sales', 0, 1200, 1200);
  animate('profit', 0, 800, 1200, '$');
  animate('clients', 0, 45, 1200);

  const ctx = document.getElementById('myChart').getContext('2d');

  const gradient = ctx.createLinearGradient(0, 0, 0, 400);
  gradient.addColorStop(0, 'rgba(59,130,246,0.5)');
  gradient.addColorStop(1, 'rgba(59,130,246,0)');

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['Пн', 'Вт', 'Ср', 'Чт', 'Пт'],
      datasets: [{
        label: 'Продажи',
        data: [12, 19, 8, 15, 22],
        borderColor: '#3b82f6',
        backgroundColor: gradient,
        fill: true,
        tension: 0.4,
        pointBackgroundColor: '#3b82f6',
        pointRadius: 5
      }]
    },
    options: {
      plugins: {
        legend: {
          labels: { color: 'white' }
        }
      },
      scales: {
        x: {
          ticks: { color: 'white' }
        },
        y: {
          ticks: { color: 'white' }
        }
      }
    }
  });

};

</script>

</body>
</html>
