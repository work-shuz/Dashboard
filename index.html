<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Live Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #020617;
      color: #fff;
    }

    .container {
      padding: 20px;
    }

    .chart-card {
      background: #0f172a;
      border-radius: 16px;
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    canvas {
      width: 100% !important;
      height: 400px !important;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="chart-card">
    <canvas id="chart"></canvas>
  </div>
</div>

<script>
/*
========================================
1. https://docs.google.com/spreadsheets/d/1u-y7T_bLZreld5F5iRNOqbZbXAj-7jTF5huikeHYUN0/edit?gid=1854183606#gid=1854183606
========================================
*/
const SHEET_ID = "PASTE_YOUR_ID_HERE";

/*
========================================
2. https://docs.google.com/spreadsheets/d/1u-y7T_bLZreld5F5iRNOqbZbXAj-7jTF5huikeHYUN0/edit?gid=1854183606#gid=1854183606
========================================
*/
const SHEET_NAME = "Sheet1";

/*
========================================
3. https://docs.google.com/spreadsheets/d/1u-y7T_bLZreld5F5iRNOqbZbXAj-7jTF5huikeHYUN0/edit?gid=1854183606#gid=1854183606
========================================
*/
async function loadData() {
  const url = `https://opensheet.elk.sh/${SHEET_ID}/${SHEET_NAME}`;
  
  const res = await fetch(url);
  const data = await res.json();

  return data;
}

/*
========================================
4. СОЗДАНИЕ ГРАФИКА
Ожидается:
date | value
========================================
*/
function createChart(labels, values) {
  const ctx = document.getElementById('chart').getContext('2d');

  const gradient = ctx.createLinearGradient(0, 0, 0, 400);
  gradient.addColorStop(0, "rgba(0,240,255,0.5)");
  gradient.addColorStop(1, "rgba(0,240,255,0)");

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Data',
        data: values,
        borderColor: '#00f0ff',
        backgroundColor: gradient,
        tension: 0.4,
        fill: true,
        borderWidth: 3,
        pointRadius: 4
      }]
    },
    options: {
      plugins: {
        legend: {
          labels: { color: '#fff' }
        }
      },
      scales: {
        x: {
          ticks: { color: '#94a3b8' },
          grid: { color: 'rgba(255,255,255,0.05)' }
        },
        y: {
          ticks: { color: '#94a3b8' },
          grid: { color: 'rgba(255,255,255,0.05)' }
        }
      }
    }
  });
}

/*
========================================
5. ИНИЦИАЛИЗАЦИЯ
========================================
*/
async function init() {
  const rows = await loadData();

  // ожидаем колонки: date | value
  const labels = rows.map(r => r.date);
  const values = rows.map(r => Number(r.value));

  createChart(labels, values);
}

init();
</script>

</body>
</html>
